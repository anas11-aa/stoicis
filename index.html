<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Stoicis</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
:root {
  --bg: #ffffff;
  --sidebar: #f7f7f8;
  --text: #111;
  --muted: #666;
  --border: #e5e5e5;
}

body.dark {
  --bg: #1c1c1c;
  --sidebar: #222;
  --text: #f3f3f3;
  --muted: #aaa;
  --border: #333;
}

body {
  margin: 0;
  font-family: "Inter", sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  height: 100vh;
}

/* Sidebar */
.sidebar {
  width: 260px;
  background: var(--sidebar);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 1rem;
}

.sidebar button {
  padding: 0.6rem;
  border: none;
  border-radius: 8px;
  background: var(--text);
  color: white;
  cursor: pointer;
  margin-bottom: 1rem;
}

.chat-list {
  flex: 1;
  overflow-y: auto;
}

.chat-item {
  padding: 0.5rem;
  cursor: pointer;
  border-radius: 6px;
  font-size: 14px;
  color: var(--muted);
}

.chat-item:hover {
  background: var(--border);
}

/* Main Area */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.header {
  padding: 1rem 2rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
}

.messages {
  flex: 1;
  overflow-y: auto;
  padding: 2rem;
  max-width: 900px;
  margin: 0 auto;
}

.message {
  margin-bottom: 2rem;
  animation: fadeIn 0.2s ease-in;
}

.user {
  font-weight: 600;
}

.assistant {
  line-height: 1.7;
}

.input-area {
  border-top: 1px solid var(--border);
  padding: 1rem 2rem;
}

textarea {
  width: 100%;
  resize: none;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 0.8rem;
  font-size: 16px;
  font-family: inherit;
  background: var(--bg);
  color: var(--text);
}

.typing {
  font-size: 14px;
  color: var(--muted);
}

pre {
  background: #111;
  color: #eee;
  padding: 1rem;
  border-radius: 8px;
  overflow-x: auto;
  position: relative;
}

.copy-btn {
  position: absolute;
  top: 6px;
  right: 6px;
  background: #444;
  border: none;
  color: white;
  padding: 3px 8px;
  font-size: 12px;
  cursor: pointer;
  border-radius: 4px;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(5px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<div class="sidebar">
  <button onclick="newChat()">+ New Chat</button>
  <div class="chat-list" id="chatList"></div>
</div>

<div class="main">
  <div class="header">
    <div>Stoicis</div>
    <button onclick="toggleTheme()">🌙</button>
  </div>

  <div class="messages" id="messages"></div>

  <div class="input-area">
    <textarea id="input" rows="1" placeholder="Send a message..."></textarea>
  </div>
</div>

<script>
let chats = JSON.parse(localStorage.getItem("stoicis_chats")) || [];
let currentChat = null;

const messagesDiv = document.getElementById("messages");
const input = document.getElementById("input");

function saveChats() {
  localStorage.setItem("stoicis_chats", JSON.stringify(chats));
}

function renderChatList() {
  const list = document.getElementById("chatList");
  list.innerHTML = "";
  chats.forEach((chat, i) => {
    const div = document.createElement("div");
    div.className = "chat-item";
    div.textContent = chat.title || "New Chat";
    div.onclick = () => loadChat(i);
    list.appendChild(div);
  });
}

function newChat() {
  const chat = { title: "New Chat", messages: [] };
  chats.push(chat);
  currentChat = chats.length - 1;
  saveChats();
  renderChatList();
  loadChat(currentChat);
}

function loadChat(index) {
  currentChat = index;
  messagesDiv.innerHTML = "";
  chats[index].messages.forEach(m => addMessage(m.role, m.content));
}

function addMessage(role, content) {
  const div = document.createElement("div");
  div.className = "message " + role;
  if (role === "assistant") {
    div.innerHTML = marked.parse(content);
    addCopyButtons(div);
  } else {
    div.textContent = content;
  }
  messagesDiv.appendChild(div);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

function addCopyButtons(container) {
  container.querySelectorAll("pre").forEach(pre => {
    const btn = document.createElement("button");
    btn.textContent = "Copy";
    btn.className = "copy-btn";
    btn.onclick = () => {
      navigator.clipboard.writeText(pre.innerText);
      btn.textContent = "Copied!";
      setTimeout(() => btn.textContent = "Copy", 1000);
    };
    pre.appendChild(btn);
  });
}

input.addEventListener("keydown", async e => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

input.addEventListener("input", () => {
  input.style.height = "auto";
  input.style.height = input.scrollHeight + "px";
});

async function sendMessage() {
  const text = input.value.trim();
  if (!text) return;

  addMessage("user", text);
  chats[currentChat].messages.push({ role: "user", content: text });
  input.value = "";
  input.style.height = "auto";

  const assistantDiv = document.createElement("div");
  assistantDiv.className = "message assistant";
  messagesDiv.appendChild(assistantDiv);

  const response = await fetch("/api/chat", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ messages: chats[currentChat].messages })
  });

  const reader = response.body.getReader();
  const decoder = new TextDecoder();
  let fullText = "";

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    const chunk = decoder.decode(value);
    fullText += chunk;
    assistantDiv.innerHTML = marked.parse(fullText);
    addCopyButtons(assistantDiv);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  }

  chats[currentChat].messages.push({ role: "assistant", content: fullText });
  chats[currentChat].title = chats[currentChat].messages[0].content.slice(0,30);
  saveChats();
  renderChatList();
}

function toggleTheme() {
  document.body.classList.toggle("dark");
}

renderChatList();
if (!chats.length) newChat();
else loadChat(0);
</script>

</body>
</html>
