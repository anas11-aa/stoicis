<script>
let conversation = [];

async function sendMessage() {
  const input = document.getElementById("input");
  const chat = document.getElementById("chat");
  const provider = document.getElementById("provider").value;
  const apiKey = document.getElementById("apikey").value;

  const message = input.value.trim();
  if (!message) return;

  // Show user message
  chat.innerHTML += `<div class="user"><b>You:</b> ${message}</div>`;
  input.value = "";

  conversation.push({ role: "user", content: message });

  let endpoint = "";
  let headers = {};
  let body = {};

  // ------------------------
  // GROQ
  // ------------------------
  if (provider === "groq") {
    endpoint = "https://api.groq.com/openai/v1/chat/completions";
    headers = {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + apiKey
    };
    body = {
      model: "llama-3.3-70b-versatile",
      messages: conversation,
      temperature: 0.7
    };
  }

  // ------------------------
  // GEMINI (Google)
  // ------------------------
  else if (provider === "gemini") {
    endpoint = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
    headers = {
      "Content-Type": "application/json"
    };
    body = {
      contents: conversation.map(m => ({
        role: m.role === "assistant" ? "model" : "user",
        parts: [{ text: m.content }]
      }))
    };
  }

  // ------------------------
  // COHERE
  // ------------------------
  else if (provider === "cohere") {
    endpoint = "https://api.cohere.ai/v1/chat";
    headers = {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + apiKey
    };
    body = {
      model: "command-r-plus",
      message: message,
      chat_history: conversation
        .filter(m => m.role !== "assistant")
        .map(m => ({
          role: m.role,
          message: m.content
        }))
    };
  }

  try {
    const response = await fetch(endpoint, {
      method: "POST",
      headers: headers,
      body: JSON.stringify(body)
    });

    const data = await response.json();
    let reply = "";

    if (provider === "groq") {
      reply = data.choices[0].message.content;
    } 
    else if (provider === "gemini") {
      reply = data.candidates[0].content.parts[0].text;
    } 
    else if (provider === "cohere") {
      reply = data.text;
    }

    conversation.push({ role: "assistant", content: reply });

    chat.innerHTML += `<div class="assistant"><b>Stoicis:</b> ${reply}</div>`;
    chat.scrollTop = chat.scrollHeight;

  } catch (error) {
    chat.innerHTML += `<div style="color:red;">Error: Check API key or provider.</div>`;
  }
}
</script>
